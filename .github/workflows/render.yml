name: Render Dream Guider Video

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium for Remotion
        run: npx remotion browser ensure

      - name: Render ProRes
        run: npx remotion render DreamGuider out/dream-guider.mov --codec=prores

      - name: Upload ProRes
        uses: actions/upload-artifact@v4
        with:
          name: dream-guider-prores
          path: out/dream-guider.mov
          retention-days: 30
